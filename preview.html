<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fuel Station Dashboard</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
    padding: 20px;
}

.container {
    max-width: 400px;
    margin: auto;
    background: #1e293b;
    padding: 20px;
    border-radius: 10px;
}

h1 {
    color: #38bdf8;
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: none;
    border-radius: 5px;
}

button {
    width: 100%;
    padding: 12px;
    background: #22c55e;
    border: none;
    color: white;
    font-size: 16px;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #16a34a;
}

.status {
    margin-top: 20px;
    padding: 10px;
    border-radius: 5px;
}

.pending { background: orange; }
.success { background: green; }
.failed { background: red; }

.loader {
    border: 4px solid #ccc;
    border-top: 4px solid #22c55e;
    border-radius: 50%;
    width: 25px;
    height: 25px;
    animation: spin 1s linear infinite;
    margin: auto;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="container">
    <h1>⛽ Fuel Station</h1>

    <input type="tel" id="phone" placeholder="07XXXXXXXX">
    <input type="number" id="amount" placeholder="Amount (Ksh)">

    <button onclick="pay()">Pay with M-Pesa</button>

    <div id="status" class="status">Ready</div>
</div>

<script>

const BASE_URL = "https://fuel-dispensortestmpesa-production.up.railway.app";

let interval;

function pay() {

    let phone = document.getElementById("phone").value;
    let amount = document.getElementById("amount").value;

    if (!phone || !amount) {
        alert("Enter phone and amount");
        return;
    }

    document.getElementById("status").innerHTML = "<div class='loader'></div> Sending STK...";
    document.getElementById("status").className = "status pending";

    fetch(BASE_URL + "/stkpush.php", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: `phone=${phone}&amount=${amount}`
    })
    .then(res => res.text())
    .then(data => {
        checkStatus();
    })
    .catch(err => {
        document.getElementById("status").innerHTML = "Error sending STK";
        document.getElementById("status").className = "status failed";
    });
}

// ================= CHECK STATUS =================
function checkStatus() {

    interval = setInterval(() => {

        fetch(BASE_URL + "/payment_status.php")
        .then(res => res.text())
        .then(status => {

            if (status === "PENDING") {
                document.getElementById("status").innerHTML = "<div class='loader'></div> Waiting for payment...";
                document.getElementById("status").className = "status pending";
            }

            else if (status === "PAID") {
                clearInterval(interval);
                document.getElementById("status").innerHTML = "✅ Payment Successful";
                document.getElementById("status").className = "status success";
            }

            else if (status === "FAILED") {
                clearInterval(interval);
                document.getElementById("status").innerHTML = "❌ Payment Failed";
                document.getElementById("status").className = "status failed";
            }

        });

    }, 3000);
}

</script>

</body>
</html>
